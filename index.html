<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Master Revive: ASMR Repair Simulator</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }
        :root {
            --bg-dark: #0a0c15;
            --accent: #f97316;
            --accent-glow: #ffaa55;
            --text: #eef2ff;
            --panel-bg: #141a26cc;
            --shop-bg: #1e253b;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0b0e17, #03050a);
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .game-container {
            max-width: 1400px;
            width: 100%;
            background: rgba(20, 26, 38, 0.9);
            backdrop-filter: blur(4px);
            border-radius: 56px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.6);
            overflow: hidden;
            border: 1px solid rgba(249,115,22,0.3);
        }
        .top-bar {
            background: #0f121dcc;
            padding: 12px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            border-bottom: 2px solid var(--accent);
            position: relative;
            z-index: 10010;
        }
        .stats {
            display: flex;
            gap: 24px;
            background: #1e2438;
            padding: 6px 22px;
            border-radius: 60px;
        }
        .stat {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
        }
        .nav-buttons {
            display: flex;
            gap: 14px;
            align-items: center;
        }
        .nav-btn {
            background: var(--accent);
            border: none;
            padding: 8px 22px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            color: #111;
            transition: 0.1s;
            z-index: 10010;
        }
        .nav-btn:active { transform: scale(0.96); }
        .gear-btn {
            background: #2c334a;
            font-size: 1.6rem;
            padding: 4px 12px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid var(--accent);
            line-height: 1;
        }
        .gear-btn:hover { background: var(--accent); color: #111; transform: rotate(15deg); }
        .progress-tracker { background: #0b0e18; padding: 8px 28px; }
        .progress-bar-container { background: #2a2f42; height: 8px; border-radius: 12px; overflow: hidden; }
        .progress-stage-fill { width: 0%; height: 100%; background: var(--accent); transition: width 0.3s ease; }

        /* MODAL OVERLAY */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            z-index: 20000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }
        .settings-modal {
            background: linear-gradient(145deg, #1a1f2e, #0f121f);
            border-radius: 48px;
            padding: 32px 40px;
            width: 360px;
            text-align: center;
            border: 2px solid var(--accent);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        .settings-modal h2 {
            color: var(--accent);
            margin-top: 0;
            font-size: 2rem;
        }
        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 24px 0;
            background: #232838;
            padding: 12px 20px;
            border-radius: 60px;
        }
        .setting-row span {
            font-weight: bold;
            font-size: 1.2rem;
        }
        .toggle-group {
            display: flex;
            gap: 12px;
        }
        .toggle-btn {
            background: #2c334a;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            transition: 0.1s;
        }
        .toggle-btn.active {
            background: var(--accent);
            color: #111;
            box-shadow: 0 0 10px var(--accent-glow);
        }
        .active-lang {
            background: #f97316 !important;
            box-shadow: 0 0 15px #ffaa55 !important;
            color: #000 !important;
            border: 2px solid #fff;
        }
        .back-game-btn {
            background: var(--accent);
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.1rem;
            margin-top: 20px;
            cursor: pointer;
            width: 100%;
        }
        .screen { display: none; padding: 26px; animation: fadeIn 0.25s; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px);} to { opacity: 1; transform: translateY(0);} }

        /* Clean device cards */
        .device-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            max-height: 65vh;
            overflow-y: auto;
            padding: 12px;
        }
        .device-card {
            background: linear-gradient(145deg, #21283e, #171e30);
            border-radius: 32px;
            padding: 18px;
            width: 180px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid rgba(249,115,22,0.5);
        }
        .device-card:hover {
            transform: translateY(-6px);
            border-color: var(--accent);
            box-shadow: 0 8px 22px rgba(249,115,22,0.3);
        }
        .device-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }
        .device-name {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 8px;
        }
        .device-reward {
            color: #facc15;
            font-size: 0.9rem;
        }
        
        .shop-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            justify-content: center;
            margin-top: 30px;
            max-height: 60vh;
            overflow-y: auto;
            padding: 10px;
        }
        .shop-item {
            background: var(--shop-bg);
            border-radius: 32px;
            padding: 20px;
            width: 260px;
            text-align: center;
            border: 1px solid rgba(249,115,22,0.3);
            transition: 0.2s;
        }
        .shop-item h3 {
            margin: 0 0 10px;
            font-size: 1.3rem;
            color: var(--accent);
        }
        .shop-item .price {
            font-size: 1.2rem;
            font-weight: bold;
            margin: 10px 0;
        }
        .shop-item .desc {
            font-size: 0.85rem;
            opacity: 0.8;
            margin: 10px 0;
        }
        .shop-item button {
            background: var(--accent);
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.1s;
        }
        .shop-item button:disabled {
            background: #2ecc71;
            cursor: not-allowed;
            opacity: 0.8;
        }
        .shop-item button.bought {
            background: #2ecc71;
        }

        .workshop-layout { display: flex; flex-wrap: wrap; gap: 28px; position: relative; }
        .canvas-area { position: relative; width: 500px; height: 500px; background: #11151f; border-radius: 36px; box-shadow: 0 0 0 3px var(--accent); overflow: hidden; }
        #deviceSvg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #1b2132; border-radius: 32px; }
        #dirtCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 32px; cursor: crosshair; display: block; }
        #drawing-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 32px;
            touch-action: none;
            z-index: 12;
            pointer-events: none; /* enabled only when brush active */
        }
        #sticker-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 15; }
        .controls-panel { flex: 1; min-width: 320px; background: var(--panel-bg); backdrop-filter: blur(12px); border-radius: 36px; padding: 22px; }
        .stage-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
        .stage-tab { background: #2c334a; border: none; padding: 6px 14px; border-radius: 40px; font-size: 0.75rem; cursor: pointer; transition: 0.1s; }
        .stage-tab.active { background: var(--accent); color: black; font-weight: bold; box-shadow: 0 0 8px var(--accent-glow); }
        .progress-bar { background: #2f3548; height: 12px; border-radius: 20px; margin: 15px 0; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: var(--accent); transition: width 0.2s; }
        button { background: var(--accent); border: none; padding: 8px 20px; border-radius: 60px; font-weight: bold; cursor: pointer; margin: 5px 5px 0 0; font-size: 0.85rem; transition: 0.1s; }
        button:disabled { background: #555; cursor: not-allowed; opacity: 0.5; }
        .power-btn { background: #2ecc71; box-shadow: 0 0 8px #2ecc71; }
        .close-lid-btn { background: #2ecc71; animation: softPulse 1s infinite; }
        @keyframes softPulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); box-shadow: 0 0 12px #2ecc71; } 100% { transform: scale(1); } }
        .lid-slide-out { transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1); transform: translateY(100%); }
        .lid-slide-in { transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1); transform: translateY(0%); }
        .boot-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: black; color: #0f0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 30; border-radius: 32px; font-family: monospace; }
        .screw { cursor: pointer; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.5)); transition: transform 0.2s ease, opacity 0.2s; transform-origin: center; pointer-events: visible; }
        .screw.fly { transform: translate(180px, 80px) scale(0.2) rotate(360deg); opacity: 0; pointer-events: none; }
        .tray-screw { width: 40px; height: 40px; background: radial-gradient(circle at 35% 35%, #cd7a32, #9b5e2c); border-radius: 50%; cursor: pointer; display: inline-block; margin: 6px; box-shadow: 0 2px 6px black; border: 1px solid #ffbb77; transition: 0.05s; }
        .tray-screw.selected { border: 3px solid gold; transform: scale(1.1); box-shadow: 0 0 12px gold; }
        .ghost-screw { stroke: #ffbb66; stroke-width: 2.5; fill: none; stroke-dasharray: 5 3; cursor: pointer; filter: drop-shadow(0 0 3px gold); transition: 0.1s; }
        .ghost-screw:hover { stroke: white; stroke-width: 3; }
        .color-swatch { width: 42px; height: 42px; border-radius: 50%; cursor: pointer; border: 2px solid white; display: inline-block; margin: 6px; }
        .sticker { width: 68px; height: 68px; cursor: pointer; border-radius: 20px; background: #2f3548; margin: 6px; display: inline-flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid gold; transition: 0.1s; }
        .sticker:hover { transform: scale(1.05); border-color: var(--accent); }
        .sticker.selected { border: 3px solid var(--accent); box-shadow: 0 0 10px var(--accent); }
        .design-panel, .sell-panel { background: #1e253b; border-radius: 28px; padding: 18px; margin-top: 18px; }
        .sticker-gallery { max-height: 200px; overflow-y: auto; display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; padding: 8px; background: rgba(0,0,0,0.3); border-radius: 20px; }
        .sell-input { background: #0f121f; border: 2px solid var(--accent); border-radius: 60px; padding: 10px 20px; color: white; font-size: 1.2rem; width: 180px; text-align: center; transition: 0.2s; }
        .price-highlight { border-color: #2ecc71 !important; box-shadow: 0 0 10px #2ecc71; background: #1e2a2a; }
        .hidden { display: none !important; }
        .tray { background: #0a0e18cc; backdrop-filter: blur(8px); border-radius: 24px; padding: 12px; margin-top: 16px; border: 2px dashed var(--accent); width: 100%; position: relative; z-index: 10005; }
        .tray-title { font-size: 0.9rem; margin-bottom: 8px; color: var(--accent); }
        #screwTrayItems { display: flex; flex-wrap: wrap; gap: 8px; min-height: 80px; }
        #parts-tray { width: 100%; margin-top: 20px; transition: 0.2s; }
        @media (max-width: 1200px) { .workshop-layout { flex-direction: column; } }
        @media (max-width: 850px) { .canvas-area { width: 380px; height: 380px; } .sticker { width: 52px; height: 52px; } }
        .sparkle-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(255,215,0,0.8) 0%, rgba(255,255,255,0) 70%); pointer-events: none; z-index: 20; animation: sparkleFade 0.8s ease-out forwards; }
        @keyframes sparkleFade { 0% { opacity: 1; transform: scale(0.8); } 100% { opacity: 0; transform: scale(1.5); } }
        .sell-btn-active { background: var(--accent) !important; box-shadow: 0 0 12px var(--accent-glow) !important; opacity: 1 !important; }
        .xray-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 25; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { box-shadow: inset 0 0 10px rgba(255,200,0,0); } 50% { box-shadow: inset 0 0 30px rgba(255,200,0,0.6); } 100% { box-shadow: inset 0 0 10px rgba(255,200,0,0); } }
        .review-popup { position: fixed; bottom: 30px; right: 30px; background: #1e2a3a; border-left: 4px solid var(--accent); border-radius: 16px; padding: 16px 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); z-index: 20000; animation: slideIn 0.3s ease-out; backdrop-filter: blur(8px); max-width: 300px; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .review-popup h4 { margin: 0 0 8px; color: var(--accent); }
        .stars { font-size: 1.4rem; letter-spacing: 4px; margin: 8px 0; }
        .review-popup button { margin-top: 10px; background: var(--accent); border: none; padding: 4px 16px; border-radius: 20px; cursor: pointer; }
        .gold-sparkle { position: absolute; width: 40px; height: 40px; background: radial-gradient(circle, gold, orange); border-radius: 50%; pointer-events: none; animation: goldPulse 0.5s ease-out forwards; z-index: 100; }
        @keyframes goldPulse { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(2); opacity: 0; } }
        .brush-tool-section { margin-top: 16px; padding-top: 12px; border-top: 1px solid rgba(249,115,22,0.4); }
        .color-palette { display: flex; gap: 10px; margin: 12px 0; flex-wrap: wrap; }
        .draw-color { width: 40px; height: 40px; border-radius: 50%; cursor: pointer; border: 2px solid white; transition: 0.1s; }
        .draw-color.active { border: 3px solid gold; transform: scale(1.05); }
        #activateBrushBtn { background: #3b82f6; color: white; margin-bottom: 10px; }
        #activateBrushBtn.locked { background: #555; cursor: not-allowed; opacity: 0.5; }
    </style>

    <!-- Yandex Games SDK (optional) -->
    <script async src="/sdk.js" onload="initYandexSDK()"></script>
</head>
<body>
<div class="game-container">
    <div class="top-bar">
        <div class="stats">
            <div class="stat">💰 <span id="balanceLabel" data-i18n="balance">Balance:</span> <span id="coinsDisplay">1200</span></div>
            <div class="stat">⭐ <span id="repDisplay">0</span></div>
        </div>
        <div class="nav-buttons">
            <button id="navMenuBtn" class="nav-btn" data-i18n="menu">🏠 Menu</button>
            <button id="navOrdersBtn" class="nav-btn" data-i18n="nav_orders">📋 Orders</button>
            <button id="navWorkshopBtn" class="nav-btn" data-i18n="workshop">🔧 Workshop</button>
            <button id="navShopBtn" class="nav-btn" data-i18n="shop">🛒 Shop</button>
            <div class="gear-btn" id="settingsGearBtn">⚙️</div>
        </div>
    </div>
    <div class="progress-tracker"><div class="progress-bar-container"><div class="progress-stage-fill" id="stageProgressFill"></div></div></div>

    <div id="menu-screen" class="screen active">
        <div style="text-align:center; margin:50px 0;">
            <h1 style="color:var(--accent); font-size:2.8rem;" data-i18n="gameTitle">⚙️ MASTER REVIVE</h1>
            <p style="font-size:1.2rem;" data-i18n="subtitle">Repair Simulator · 14 devices · ASMR sounds</p>
            <button id="startGameBtn" class="nav-btn" style="font-size:1.3rem;" data-i18n="startRepair">▶️ START REPAIR</button>
        </div>
    </div>

    <div id="orders-screen" class="screen">
        <h2 data-i18n="selectDevice">📟 Select Device</h2>
        <div class="device-grid" id="deviceGrid"></div>
        <button id="backMenuFromOrders" data-i18n="back">⬅ Back</button>
    </div>

    <div id="workshop-screen" class="screen">
        <div class="workshop-layout">
            <div class="canvas-area" id="canvasArea">
                <svg id="deviceSvg" viewBox="0 0 500 500"></svg>
                <canvas id="dirtCanvas" width="500" height="500"></canvas>
                <canvas id="drawing-layer" width="500" height="500"></canvas>
                <div id="sticker-layer"></div>
            </div>
            <div class="controls-panel">
                <div class="stage-tabs" id="stageTabs"></div>
                <div class="progress-bar"><div class="progress-fill" id="phaseProgress"></div></div>
                <div id="phaseInstructions"></div>
                <div id="phaseActions"></div>
                <button id="nextPhaseBtn" class="hidden" data-i18n="nextStage">➡ Next Stage</button>
                <button id="openLidBtn" class="hidden" data-i18n="openLid">🔓 OPEN LID</button>
                <button id="closeLidBtn" class="close-lid-btn hidden" data-i18n="closeLid">🔒 CLOSE LID</button>
                <button id="powerOnBtn" class="power-btn hidden" data-i18n="powerOn">⚡ POWER ON</button>
                <button id="sellBtn" class="hidden" data-i18n="sellBtn">💰 SELL GADGET</button>
                <div id="designPanel" class="design-panel hidden">
                    <div><strong data-i18n="designTitle">🎨 DESIGN: select sticker & click on device</strong></div>
                    <div id="colorPicker"></div>
                    <div><strong data-i18n="stickerGalleryTitle">✨ STICKER GALLERY</strong></div>
                    <div class="sticker-gallery" id="stickerGallery"></div>
                    <div id="stickerFeedback" style="font-size:0.7rem; margin-top:6px;" data-i18n="stickerHint">Click sticker, then on device</div>
                    <div class="brush-tool-section" id="brushToolSection">
                        <button id="activateBrushBtn" data-i18n="brush">🖌️ Brush</button>
                        <div id="drawPalette" class="color-palette" style="display: none;"></div>
                        <button id="wipeDrawingBtn" style="display: none;" data-i18n="clearDrawing">🧽 Clear Drawing</button>
                    </div>
                </div>
                <div id="sellPanel" class="sell-panel hidden">
                    <div><strong data-i18n="setPrice">💰 SET PRICE</strong></div>
                    <div id="priceRange"></div>
                    <input type="number" id="priceInput" class="sell-input" data-i18n-placeholder="enterPrice" placeholder="Enter amount">
                    <button id="submitPriceBtn" disabled data-i18n="sellAndContinue">Sell & Continue</button>
                    <div id="sellFeedback"></div>
                </div>
            </div>
        </div>
        <div id="parts-tray" class="tray hidden">
            <div class="tray-title" data-i18n="screwTray">🔩 SCREW TRAY (click to select)</div>
            <div id="screwTrayItems"></div>
        </div>
    </div>

    <div id="shop-screen" class="screen">
        <h2 data-i18n="shopTitle">🛒 WORKSHOP UPGRADES</h2>
        <div class="shop-grid" id="shopGrid"></div>
        <button id="backShopBtn" style="margin-top: 30px;" data-i18n="back">⬅ Back to Menu</button>
    </div>
</div>

<!-- Settings Modal -->
<div id="settingsModal" class="modal-overlay">
    <div class="settings-modal">
        <h2 data-i18n="settingsTitle">⚙️ SETTINGS</h2>
        <div class="setting-row">
            <span data-i18n="languageLabel">🌐 Language</span>
            <div class="toggle-group" id="langToggleGroup">
                <button id="lang-ru" class="toggle-btn lang-btn">RU</button>
                <button id="lang-en" class="toggle-btn lang-btn">EN</button>
            </div>
        </div>
        <div class="setting-row">
            <span data-i18n="soundLabel">🔊 Sound</span>
            <div class="toggle-group" id="soundToggleGroup">
                <button id="sound-on" class="toggle-btn sound-btn">🔈 ON</button>
                <button id="sound-off" class="toggle-btn sound-btn">🔇 OFF</button>
            </div>
        </div>
        <button id="backToGameBtn" class="back-game-btn" data-i18n="backToGame">⬅ Back to Game</button>
    </div>
</div>

<script>
    // ========== SOUND MANAGER (with mute) ==========
    let isMuted = false;
    class SoundManager {
        constructor() {
            this.ctx = null;
            this.initialized = false;
            this.lastCleanTime = 0;
            this.throttleDelay = 80;
        }
        init() {
            if (this.ctx) return;
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            this.initialized = true;
            if (this.ctx.state === 'suspended') this.ctx.resume();
        }
        _play(fn) { if (!isMuted && this.ctx) fn(); }
        tone(freq, duration, volume = 0.1, type = 'sine') { this._play(() => { const now = this.ctx.currentTime; const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain(); osc.type = type; osc.frequency.value = freq; gain.gain.setValueAtTime(volume, now); gain.gain.exponentialRampToValueAtTime(0.001, now + duration); osc.connect(gain); gain.connect(this.ctx.destination); osc.start(); osc.stop(now + duration); }); }

    function initDrawingEngine() {
        drawingCtx = drawingCanvas.getContext('2d');
        drawingCtx.lineCap = 'round';
        drawingCtx.lineJoin = 'round';
        drawingCtx.lineWidth = 6;
        drawingCtx.strokeStyle = currentDrawColor;
        drawingCtx.clearRect(0, 0, 500, 500);
    }

    function startDraw(e) {
        if (!brushActive || game.stage !== 5) return;
        e.preventDefault();
        const rect = drawingCanvas.getBoundingClientRect();
        const scaleX = drawingCanvas.width / rect.width;
        const scaleY = drawingCanvas.height / rect.height;
        let clientX, clientY;
        if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        const x = (clientX - rect.left) * scaleX;
        const y = (clientY - rect.top) * scaleY;
        isDrawing = true;
        lastX = x;
        lastY = y;
        drawingCtx.beginPath();
        drawingCtx.moveTo(x, y);
        drawingCtx.lineTo(x+0.5, y+0.5);
        drawingCtx.stroke();
        sounds.sticker(); // brush sound
    }

    function drawMove(e) {
        if (!isDrawing || !brushActive) return;
        e.preventDefault();
        const rect = drawingCanvas.getBoundingClientRect();
        const scaleX = drawingCanvas.width / rect.width;
        const scaleY = drawingCanvas.height / rect.height;
        let clientX, clientY;
        if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        const x = (clientX - rect.left) * scaleX;
        const y = (clientY - rect.top) * scaleY;
        drawingCtx.beginPath();
        drawingCtx.moveTo(lastX, lastY);
        drawingCtx.lineTo(x, y);
        drawingCtx.stroke();
        lastX = x;
        lastY = y;
    }

    function endDraw() {
        isDrawing = false;
    }

    function setupDrawingEvents() {
        drawingCanvas.addEventListener('pointerdown', startDraw);
        drawingCanvas.addEventListener('pointermove', drawMove);
        drawingCanvas.addEventListener('pointerup', endDraw);
        drawingCanvas.addEventListener('pointercancel', endDraw);
    }

    function clearDrawingCanvas() {
        if (drawingCtx) drawingCtx.clearRect(0, 0, 500, 500);
    }

    function setDrawColor(color) {
        currentDrawColor = color;
        if (drawingCtx) drawingCtx.strokeStyle = color;
    }

    function updateBrushUI() {
        const brushBtn = document.getElementById('activateBrushBtn');
        const paletteDiv = document.getElementById('drawPalette');
        const wipeBtn = document.getElementById('wipeDrawingBtn');
        const unlocked = upgrades.artistPack;
        if (unlocked) {
            brushBtn.classList.remove('locked');
            brushBtn.disabled = false;
            paletteDiv.style.display = 'flex';
            wipeBtn.style.display = 'inline-block';
            if (!paletteDiv.hasChildNodes()) {
                const colors = ['#ff3333', '#39ff14', '#3b82f6', '#facc15', '#ffffff'];
                colors.forEach(col => {
                    const swatch = document.createElement('div');
                    swatch.className = 'draw-color';
                    swatch.style.backgroundColor = col;
                    swatch.addEventListener('click', () => {
                        setDrawColor(col);
                        document.querySelectorAll('.draw-color').forEach(c => c.classList.remove('active'));
                        swatch.classList.add('active');
                    });
                    paletteDiv.appendChild(swatch);
                });
                const first = paletteDiv.firstChild;
                if (first) first.classList.add('active');
            }
        } else {
            brushBtn.classList.add('locked');
            brushBtn.disabled = true;
            paletteDiv.style.display = 'none';
            wipeBtn.style.display = 'none';
        }
    }

    function toggleBrushMode() {
        if (!upgrades.artistPack) return;
        brushActive = !brushActive;
        const brushBtn = document.getElementById('activateBrushBtn');
        if (brushActive) {
            brushBtn.style.background = '#2ecc71';
            drawingCanvas.style.pointerEvents = 'auto';

    function updateStageProgress() { stageProgressFill.style.width = (game.stage/6)*100 + "%"; }
    function updatePhaseProgress() {
        let percent = 0;
        if(game.stage===0) percent = game.cleaningProgress;
        else if(game.stage===1) percent = (game.screwsRemoved / game.totalScrews) * 100;
        else if(game.stage===2) percent = game.repairDone ? 100 : (game.repairProgress / game.repairRequired) * 100;
        else if(game.stage===3) percent = (game.screwsReinserted / game.totalScrews) * 100;
        else percent = 100;
        phaseProgressDiv.style.width = percent + "%";
    }

        stageTabsContainer.innerHTML = stageNames.map((name, idx) => `<button class="stage-tab ${idx === game.stage ? 'active' : ''}" data-stage="${idx}">${name}</button>`).join('');

    function updateSellPanel() {
        if(!game.device) return;
        let min = game.device.minPrice;
        let max = game.device.maxPrice;
        if (upgrades.license) max = Math.floor(max * 1.3);
        if (upgrades.goldenScrews) max = Math.floor(max * 1.1);
        if (game.goldFound) max += 300;
        if (game.thermalPasteBonus) max = Math.floor(max * 1.15);
        priceRangeDiv.innerHTML = `${translations[currentLang].priceRangeLabel} $${min} - $${max}`;
        submitPriceBtn.disabled = true;
        submitPriceBtn.classList.remove('sell-btn-active');
        sellFeedback.innerHTML = '';
        priceInput.value = '';
        priceInput.classList.remove('price-highlight');
        priceInput.oninput = () => {
            const val = parseInt(priceInput.value);
            if (!isNaN(val) && val >= min && val <= max) {
                submitPriceBtn.disabled = false;
                submitPriceBtn.classList.add('sell-btn-active');
                sellFeedback.innerHTML = translations[currentLang].priceValid;
                sounds.uiPriceValid();
                if (upgrades.priceScanner && val === max) priceInput.classList.add('price-highlight');
                else priceInput.classList.remove('price-highlight');
            } else if (!isNaN(val) && val < min) {
                submitPriceBtn.disabled = true;
                submitPriceBtn.classList.remove('sell-btn-active');
                sellFeedback.innerHTML = translations[currentLang].priceLow;
                priceInput.classList.remove('price-highlight');
                sounds.uiError();
            } else if (!isNaN(val) && val > max) {
                submitPriceBtn.disabled = true;
                submitPriceBtn.classList.remove('sell-btn-active');
                sellFeedback.innerHTML = translations[currentLang].priceHigh;
                priceInput.classList.remove('price-highlight');
                sounds.uiError();
            } else {
                submitPriceBtn.disabled = true;
                submitPriceBtn.classList.remove('sell-btn-active');
                sellFeedback.innerHTML = '';
                priceInput.classList.remove('price-highlight');
            }
        };
        priceInput.focus();
    }

    function closeLidAndReassemble() {
        if(game.stage === 2 && game.repairDone) { game.stage = 3; updateUI(); }
        if(game.stage === 3) {
            sounds.lidClose();
            document.getElementById('internalsGroup').style.display = "none";
            let caseGroup = document.getElementById('caseGroup');
            caseGroup.style.display = "block";
            caseGroup.classList.remove('lid-slide-out');
            caseGroup.classList.add('lid-slide-in');
            setTimeout(() => caseGroup.classList.remove('lid-slide-in'), 400);
            closeLidBtn.classList.add('hidden');

            if (upgrades.autoAssembler) {
                for(let i=0; i<game.totalScrews; i++) {
                    let pos = game.screwPositions[i];
                    let newScrew = document.createElementNS("http://www.w3.org/2000/svg","circle");
                    newScrew.setAttribute("cx", pos.x);
                    newScrew.setAttribute("cy", pos.y);
                    newScrew.setAttribute("r", "12");
                    newScrew.setAttribute("fill", upgrades.goldenScrews ? "#FFD700" : "#b87333");
                    deviceSvg.appendChild(newScrew);
                    addSparkleAt(pos.x, pos.y);
                }
                game.screwsReinserted = game.totalScrews;
                updatePhaseProgress();
                game.stage = 4;
                updateUI();
                phaseInstructions.innerText = "Auto-assembly done! Click 'POWER ON'.";
                return;
            }

            let snapDistance = upgrades.magneticMat ? 100 : 60;
            for(let i=0; i<game.totalScrews; i++) {
                let pos = game.screwPositions[i];
                let ghost = document.createElementNS("http://www.w3.org/2000/svg","circle");
                ghost.setAttribute("cx", pos.x);
                ghost.setAttribute("cy", pos.y);
                ghost.setAttribute("r", "14");
                ghost.setAttribute("stroke", "#ffaa44");
                ghost.setAttribute("stroke-width", "2.5");
                ghost.setAttribute("fill", "none");
                ghost.setAttribute("stroke-dasharray", "5 3");
                ghost.classList.add("ghost-screw");
                let hitArea = document.createElementNS("http://www.w3.org/2000/svg","circle");
                hitArea.setAttribute("cx", pos.x);
                hitArea.setAttribute("cy", pos.y);
                hitArea.setAttribute("r", snapDistance);
                hitArea.setAttribute("fill", "transparent");
                hitArea.setAttribute("stroke", "none");
                hitArea.setAttribute("pointer-events", "visible");
                hitArea.addEventListener('click', () => {
                    if(game.stage === 3 && game.selectedTrayScrew !== null && game.screwsInTray > 0) {
                        sounds.screwInsert();
                        ghost.remove();
                        hitArea.remove();
                        game.screwsInTray--;
                        game.screwsReinserted++;
                        game.selectedTrayScrew = null;
                        updateScrewTrayUI();
                        let newScrew = document.createElementNS("http://www.w3.org/2000/svg","circle");
                        newScrew.setAttribute("cx", pos.x);
                        newScrew.setAttribute("cy", pos.y);
                        newScrew.setAttribute("r", "12");
                        newScrew.setAttribute("fill", upgrades.goldenScrews ? "#FFD700" : "#b87333");
                        deviceSvg.appendChild(newScrew);
                        addSparkleAt(pos.x, pos.y);
                        updatePhaseProgress();
                        if(game.screwsReinserted === game.totalScrews) {
                            game.stage = 4;
                            updateUI();
                            phaseInstructions.innerText = "Assembly complete! Click 'POWER ON'.";
                        }
                    } else phaseInstructions.innerText = "Select a screw from tray first!";
                });
                deviceSvg.appendChild(ghost);
                deviceSvg.appendChild(hitArea);
                game.ghostHoles.push({ghost, hitArea});
            }
            phaseInstructions.innerText = "Select a screw from tray, click on ghost hole.";
        }
    }

    function showReviewPopup(rating, message, bonus) {
        const popup = document.createElement('div');
        popup.className = 'review-popup';
        let stars = '';
        for (let i = 1; i <= 5; i++) stars += i <= rating ? '★' : '☆';
        popup.innerHTML = `
            <h4>📝 Customer Review</h4>
            <div class="stars">${stars}</div>
            <p>${message}</p>
            ${bonus > 0 ? `<p style="color:#facc15;">+${bonus}$ bonus!</p>` : ''}
            <button onclick="this.parentElement.remove()">OK</button>
        `;

    }

    function sellDevice() {
        if(game.stage !== 6) return;
        let min = game.device.minPrice;
        let max = game.device.maxPrice;
        if (upgrades.license) max = Math.floor(max * 1.3);
        if (upgrades.goldenScrews) max = Math.floor(max * 1.1);
        if (game.goldFound) max += 300;
        if (game.thermalPasteBonus) max = Math.floor(max * 1.15);
        const price = parseInt(priceInput.value);
        if (isNaN(price) || price < min || price > max) {
            sellFeedback.innerHTML = translations[currentLang].priceLow;
            sounds.uiError();
            return;
        }
        let finalPrice = price;
        let rating = 3;
        let reviewMessage = currentLang === 'ru' ? "Работает, но винтиков не хватает..." : "Works, but missing some screws...";
        let bonus = 0;
        const cleanPercent = game.cleaningProgress;
        const allScrews = (game.screwsReinserted === game.totalScrews);
        if (cleanPercent >= 100 && allScrews) {
            rating = 5;
            reviewMessage = currentLang === 'ru' ? "Идеально! Как новый!" : "Perfect! Like new!";
            bonus = Math.floor(finalPrice * 0.2);
            finalPrice += bonus;
        } else if (cleanPercent < 90) {
            rating = 1;
            reviewMessage = currentLang === 'ru' ? "Грязный телефон! Ужасно!" : "Dirty device! Terrible!";
        } else if (!allScrews) {
            rating = 3;
            reviewMessage = currentLang === 'ru' ? "Работает, но винтиков не хватает..." : "Works, but missing screws...";
        } else {
            rating = 4;
            reviewMessage = currentLang === 'ru' ? "Хорошо, но могло быть чище." : "Good, but could be cleaner.";
        }
        player.coins += finalPrice;
        player.currentDeviceIndex = (player.currentDeviceIndex + 1) % DEVICES.length;
        localStorage.setItem('techMasterSave', JSON.stringify({coins:player.coins, level:player.currentDeviceIndex}));
        document.getElementById('coinsDisplay').innerText = player.coins;
        showReviewPopup(rating, reviewMessage, bonus);
        sounds.sell();
        document.getElementById('sticker-layer').innerHTML = '';
        ctx.clearRect(0, 0, 500, 500);
        clearDrawingCanvas(); // clear drawing for next customer
        startDevice(DEVICES[player.currentDeviceIndex]);
    }

    function applyUltrasonicCleaning() {
        if (!upgrades.ultrasonic) return;
        sounds.ultrasonic();
        const imgData = ctx.getImageData(0, 0, 500, 500);
        const data = imgData.data;
        const totalPixels = 500 * 500;
        const targetCleared = Math.floor(totalPixels * 0.3);
        let cleared = 0;
        while (cleared < targetCleared) {
            const idx = Math.floor(Math.random() * totalPixels) * 4 + 3;
            if (data[idx] > 30) {
                data[idx] = 0;
                cleared++;
            }
        }
        ctx.putImageData(imgData, 0, 0);
        let transparent = 0;
        for (let i = 3; i < data.length; i += 4) if (data[i] < 30) transparent++;
        game.cleaningProgress = Math.min(100, Math.floor((transparent / totalPixels) * 100));
        updatePhaseProgress();
    }

    function startDevice(device) {
        game.device = device;
        game.totalScrews = device.screws;
        game.screwsRemoved = 0;
        game.screwsInTray = 0;
        game.screwsReinserted = 0;
        game.repairDone = false;
        game.repairProgress = 0;
        game.selectedTrayScrew = null;
        game.ghostHoles = [];
        game.cleaningProgress = 0;
        game.goldFound = false;
        game.thermalPasteBonus = false;
        game.stage = 0;
        updateStageProgress();
        deviceSvg.innerHTML = '';
        let caseGroup = document.createElementNS("http://www.w3.org/2000/svg","g"); caseGroup.id = "caseGroup";
        caseGroup.innerHTML = device.caseSvg();
        deviceSvg.appendChild(caseGroup);
        let internalsGroup = document.createElementNS("http://www.w3.org/2000/svg","g"); internalsGroup.id = "internalsGroup";
        internalsGroup.innerHTML = device.internalsSvg() + `<g id="repairTargetGroup"></g>`;
        internalsGroup.style.display = "none";
        deviceSvg.appendChild(internalsGroup);
        
        let positions = device.screwPos.map(p => ({x: p[0], y: p[1]}));
        game.screwPositions = positions;
        const fastUnscrew = upgrades.screwdriver || upgrades.robotAssistant;
        const screwColor = upgrades.goldenScrews ? "#FFD700" : "#b87333";
        for(let i=0; i<device.screws; i++) {
            let screw = document.createElementNS("http://www.w3.org/2000/svg","circle");
            screw.setAttribute("cx", positions[i].x);
            screw.setAttribute("cy", positions[i].y);
            screw.setAttribute("r", "12");
            screw.setAttribute("fill", screwColor);
            screw.setAttribute("stroke", "#6b3e1a");
            screw.classList.add("screw");
            screw.addEventListener("click", (e) => {
                if(game.stage === 1) {
                    if (device.hasLoot && !game.goldFound && Math.random() < 0.15) {
                        game.goldFound = true;
                        sounds.gold();
                        const rect = document.querySelector('.canvas-area').getBoundingClientRect();
                        const goldDiv = document.createElement('div');
                        goldDiv.className = 'gold-sparkle';
                        goldDiv.style.left = (rect.left + rect.width/2) + 'px';
                        goldDiv.style.top = (rect.top + rect.height/2) + 'px';
                        document.body.appendChild(goldDiv);
                        setTimeout(() => goldDiv.remove(), 500);
                        phaseInstructions.innerText = "✨ You found a gold part! +$300 to price! ✨";
                        setTimeout(() => phaseInstructions.innerText = "🔩 Click screws to remove them.", 2000);
                    }
                    if (fastUnscrew || upgrades.megaMagnet) {
                        sounds.unscrew();
                        screw.remove();
                        game.screwsRemoved++;
                        game.screwsInTray++;
                        updateScrewTrayUI();
                        updatePhaseProgress();
                        if(game.screwsRemoved === game.totalScrews) {
                            openLidBtn.classList.remove('hidden');
                            phaseInstructions.innerText = "All screws removed! Click 'OPEN LID'.";
                        }
                    } else {
                        sounds.unscrew();
                        screw.classList.add('fly');
                        setTimeout(() => {
                            screw.remove();
                            game.screwsRemoved++;
                            game.screwsInTray++;
                            updateScrewTrayUI();
                            updatePhaseProgress();
                            if(game.screwsRemoved === game.totalScrews) {
                                openLidBtn.classList.remove('hidden');
                                phaseInstructions.innerText = "All screws removed! Click 'OPEN LID'.";
                            }
                        }, 150);
                    }
                }
            });
            deviceSvg.appendChild(screw);
        }
        ctx.clearRect(0,0,500,500);
        ctx.fillStyle = "#6b4c3b";
        ctx.fillRect(0,0,500,500);
        for(let i=0;i<600;i++) {
            ctx.fillStyle = `rgba(40,25,15,${0.5+Math.random()*0.5})`;
            ctx.beginPath(); ctx.arc(Math.random()*500, Math.random()*500, Math.random()*12+3, 0, Math.PI*2);
            ctx.fill();
        }
        applyUltrasonicCleaning();
        dirtCanvas.style.pointerEvents = "auto";
        updateUI();
        switchScreen('workshop');
        sounds.swoosh();
        // clear drawing canvas when starting new device (redundant with sellDevice but safe)
        clearDrawingCanvas();
    }

    let eraserRadius = upgrades.brush ? 45 : 30;
    function cleanErase(x,y) {
        if(game.stage !== 0) return;
        sounds.clean();
        ctx.save();
        ctx.globalCompositeOperation = "destination-out";
        ctx.beginPath();
        ctx.arc(x, y, eraserRadius, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
        let imgData = ctx.getImageData(0,0,500,500);
        let transparent = 0;
        for(let i=3;i<imgData.data.length;i+=4) if(imgData.data[i] < 30) transparent++;
        game.cleaningProgress = Math.min(100, Math.floor((transparent/(500*500))*100));
        updatePhaseProgress();
        if(game.cleaningProgress >= 85) {
            ctx.clearRect(0,0,500,500);
            game.cleaningProgress = 100;
            updatePhaseProgress();
            nextPhaseBtn.classList.remove('hidden');
            phaseInstructions.innerText = "✨ Perfect cleanliness! ✨";
        }
    }

    dirtCanvas.addEventListener('mousedown', (e) => {
        if(game.stage !== 0) return;
        ensureAudio();
        let rect = dirtCanvas.getBoundingClientRect();
        let x = (e.clientX - rect.left) * (500/rect.width);
        let y = (e.clientY - rect.top) * (500/rect.height);
        cleanErase(x,y);
        let moveHandler = (me) => {
            let mx = (me.clientX - rect.left) * (500/rect.width);
            let my = (me.clientY - rect.top) * (500/rect.height);
            cleanErase(mx,my);
        };
        window.addEventListener('mousemove', moveHandler);
        window.addEventListener('mouseup', () => window.removeEventListener('mousemove', moveHandler), {once:true});
    });

    dirtCanvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        ensureAudio();
        let rect = dirtCanvas.getBoundingClientRect();
        let touch = e.touches[0];
        let x = (touch.clientX - rect.left) * (500/rect.width);
        let y = (touch.clientY - rect.top) * (500/rect.height);
        cleanErase(x,y);
        let moveHandler = (me) => {
            let mt = me.touches[0];
            let mx = (mt.clientX - rect.left) * (500/rect.width);
            let my = (mt.clientY - rect.top) * (500/rect.height);
            cleanErase(mx,my);
        };
        window.addEventListener('touchmove', moveHandler);
        window.addEventListener('touchend', () => window.removeEventListener('touchmove', moveHandler), {once:true});
    });

            });
        });
    }

    function renderShop() {
        const t = translations[currentLang];
        const upgradesList = [
            { id: 'screwdriver', name: t.electricScrewdriver, price: UPGRADE_PRICES.screwdriver, desc: currentLang === 'ru' ? 'Откручивает винты в 2 раза быстрее' : 'Unscrew 2x faster' },
            { id: 'xray', name: t.xray, price: UPGRADE_PRICES.xray, desc: currentLang === 'ru' ? 'Подсвечивает оставшуюся грязь' : 'Highlights remaining dirt' },
            { id: 'robotAssistant', name: t.robotHelper, price: UPGRADE_PRICES.robotAssistant, desc: currentLang === 'ru' ? 'Автоматически собирает винты в лоток' : 'Auto-collects screws' },
            { id: 'ultrasonic', name: t.ultraSolvent, price: UPGRADE_PRICES.ultrasonic, desc: currentLang === 'ru' ? 'Удаляет 30% грязи мгновенно' : 'Removes 30% dirt instantly' },
            { id: 'artistPack', name: t.artistPack, price: UPGRADE_PRICES.artistPack, desc: currentLang === 'ru' ? 'Разблокирует инструмент «Кисть» в режиме дизайна' : 'Unlocks the Brush tool in Design stage' }
        ];
        shopGrid.innerHTML = upgradesList.map(up => `
            <div class="shop-item">
                <h3>${up.name}</h3>
                <div class="price">💰 ${up.price} ${currentLang === 'ru' ? 'монет' : 'coins'}</div>
                <div class="desc">${up.desc}</div>
                <button id="buy-${up.id}" ${upgrades[up.id] ? 'disabled class="bought"' : ''}>${upgrades[up.id] ? '✅ ' + (currentLang === 'ru' ? 'КУПЛЕНО' : 'OWNED') : (currentLang === 'ru' ? 'КУПИТЬ' : 'BUY')}</button>
            </div>
        `).join('');
        upgradesList.forEach(up => {
            const btn = document.getElementById(`buy-${up.id}`);
            if (btn && !upgrades[up.id]) btn.addEventListener('click', () => {
                if (player.coins >= up.price) {
                    player.coins -= up.price;
                    upgrades[up.id] = true;
                    saveUpgrades();
                    document.getElementById('coinsDisplay').innerText = player.coins;
                    renderShop();
                    sounds.uiBuy();
                    // if artist pack purchased, update brush UI immediately
                    if (up.id === 'artistPack') updateBrushUI();
                } else {
                    sounds.uiError();
                    alert(t.notEnoughCoins);
                }
            });
        });
    }

    // Event Listeners
    document.getElementById('navMenuBtn').addEventListener('click', () => switchScreen('menu'));
    document.getElementById('navOrdersBtn').addEventListener('click', () => switchScreen('orders'));
    document.getElementById('navWorkshopBtn').addEventListener('click', () => {
        if(game.device) switchScreen('workshop');
        else { alert(translations[currentLang].selectDevice); switchScreen('orders'); }
        sounds.uiClick();
    });
    document.getElementById('navShopBtn').addEventListener('click', () => switchScreen('shop'));
    document.getElementById('startGameBtn').addEventListener('click', () => switchScreen('orders'));
    document.getElementById('backMenuFromOrders').addEventListener('click', () => switchScreen('menu'));
    document.getElementById('backShopBtn').addEventListener('click', () => switchScreen('menu'));

    nextPhaseBtn.addEventListener('click', () => { nextPhase(); sounds.uiClick(); });
    openLidBtn.addEventListener('click', () => { openLid(); sounds.uiClick(); });
    closeLidBtn.addEventListener('click', () => { closeLidAndReassemble(); sounds.uiClick(); });
    powerOnBtn.addEventListener('click', () => { powerOn(); sounds.uiClick(); });
    sellBtn.addEventListener('click', () => { game.stage = 6; updateUI(); sounds.uiClick(); });
    submitPriceBtn.addEventListener('click', () => { sellDevice(); sounds.uiClick(); });

    // Settings Modal
    const modal = document.getElementById('settingsModal');
    const gearBtn = document.getElementById('settingsGearBtn');
    const backToGameBtn = document.getElementById('backToGameBtn');
    gearBtn.onclick = () => { modal.classList.add('active'); updateLangButtons(); updateSoundUI(); };
    backToGameBtn.onclick = () => modal.classList.remove('active');
    document.getElementById('lang-ru').onclick = () => setLanguage('ru');
    document.getElementById('lang-en').onclick = () => setLanguage('en');
    document.getElementById('sound-on').onclick = () => setMute(false);
    document.getElementById('sound-off').onclick = () => setMute(true);
    function updateLangButtons() { document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active-lang')); document.getElementById(`lang-${currentLang}`)?.classList.add('active-lang'); }
    function updateSoundUI() {
        const soundOn = document.getElementById('sound-on');
        const soundOff = document.getElementById('sound-off');
        if (soundOn && soundOff) {
            if (!isMuted) { soundOn.classList.add('active'); soundOff.classList.remove('active'); }
            else { soundOff.classList.add('active'); soundOn.classList.remove('active'); }
        }
    }

    // Initialization
    let saved = localStorage.getItem('techMasterSave');
    if(saved) {
        try {
            let d = JSON.parse(saved);
            player.coins = d.coins || 1200;
            player.currentDeviceIndex = d.level || 0;
            document.getElementById('coinsDisplay').innerText = player.coins;
        } catch(e) {}
    }
    loadUpgrades();
    if (upgrades.brush) eraserRadius = 45;
    setLanguage(currentLang);
    setMute(isMuted);
    switchScreen('menu');

    // Drawing engine initialization
    initDrawingEngine();
    setupDrawingEvents();
    updateBrushUI();
    document.getElementById('activateBrushBtn').addEventListener('click', toggleBrushMode);
    document.getElementById('wipeDrawingBtn').addEventListener('click', () => { clearDrawingCanvas(); sounds.uiClick(); });
</script>

<!-- Yandex Games SDK init -->
<script>
    let ysdk = null;
    window.initYandexSDK = async function() {
        try {
            if (typeof YaGames !== 'undefined') {
                ysdk = await YaGames.init();
                console.log('Yandex SDK initialized');
            } else {
                console.warn('YaGames not defined (local testing)');
            }
        } catch (e) {
            console.error('Yandex SDK init error:', e);
        }
    };
    if (typeof YaGames !== 'undefined') {
        initYandexSDK();
    }
</script>
</body>
